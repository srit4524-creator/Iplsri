  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{--dark:#050810;--dark2:#0d1117;--gold:#FFD700;--font-d:'Bebas Neue',sans-serif;--font-u:'Rajdhani',sans-serif;--font-t:'Orbitron',monospace;}
    html,body{height:100%;font-family:var(--font-u);background:var(--dark);color:#fff;overflow:hidden;}
    ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#333;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pricePop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes glow{0%,100%{opacity:.3}50%{opacity:.9}}
    @keyframes rise{0%{transform:translateY(100%);opacity:0}60%{opacity:.8}100%{transform:translateY(-120px);opacity:0}}
    @keyframes soldAnim{0%{opacity:0;transform:scale(.4) rotate(-15deg)}65%{transform:scale(1.12) rotate(4deg)}100%{opacity:1;transform:scale(1) rotate(-5deg)}}
    @keyframes ticker{from{transform:translateX(100vw)}to{transform:translateX(-100%)}}
    @keyframes borderPulse{0%,100%{box-shadow:0 0 6px currentColor}50%{box-shadow:0 0 24px currentColor}}
    @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

    #setupScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#0d1a3a,#050810);padding:24px;}
    .sc{background:#0d1117;border:1px solid #1f2937;border-radius:18px;padding:26px 22px;max-width:400px;width:100%;}
    .st{font-family:var(--font-d);font-size:36px;color:var(--gold);letter-spacing:4px;text-align:center;margin-bottom:22px;}
    .si{width:100%;padding:12px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#fff;font-size:14px;font-family:var(--font-u);margin-bottom:12px;display:block;outline:none;}
    .si:focus{border-color:var(--gold);}
    .sb{width:100%;padding:14px;background:linear-gradient(135deg,#b8860b,#FFD700);border:none;border-radius:10px;font-family:var(--font-d);font-size:22px;letter-spacing:3px;color:#000;cursor:pointer;}

    #stageRoot{display:none;height:100vh;position:relative;overflow:hidden;}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 20%,#0d1a3a,#050810);z-index:0;}
    .pts{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
    .pt{position:absolute;bottom:-10px;width:3px;height:3px;border-radius:50%;background:rgba(255,215,0,.5);animation:rise var(--d,4s) infinite ease-in var(--dl,0s);}

    .hdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;}
    .brand{font-family:var(--font-d);font-size:28px;color:var(--gold);letter-spacing:6px;}
    .lpill{display:flex;align-items:center;gap:7px;background:rgba(255,23,68,.12);border:1px solid #ff1744;padding:5px 13px;border-radius:4px;}
    .ldot{width:7px;height:7px;background:#ff1744;border-radius:50%;animation:pulse 1s infinite;}
    .ltxt{font-size:10px;color:#ff1744;font-weight:700;letter-spacing:3px;}

    .main{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;padding:0 20px 90px;}

    .idle{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 80px);}
    .idle-ic{font-size:88px;filter:drop-shadow(0 0 30px #FFD700);animation:glow 2s infinite;}
    .idle-tx{font-family:var(--font-d);font-size:38px;color:var(--gold);letter-spacing:6px;margin-top:16px;text-align:center;}
    .idle-sx{color:#374151;font-size:13px;letter-spacing:3px;margin-top:6px;}

    .pstage{display:flex;flex-direction:column;align-items:center;animation:fadeUp .5s ease;}
    .awrap{position:relative;margin:8px 0 14px;}
    .sphoto{width:158px;height:158px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,215,0,.3);display:block;position:relative;z-index:2;}
    .sfb{width:158px;height:158px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:68px;z-index:2;border:3px solid rgba(255,255,255,.1);}
    .aring{position:absolute;inset:-10px;border-radius:50%;border:2px solid var(--gold);opacity:.3;animation:glow 2s infinite;}
    .aglow{position:absolute;inset:-30px;border-radius:50%;opacity:.12;filter:blur(25px);}

    .sname{font-family:var(--font-d);font-size:52px;color:#fff;letter-spacing:4px;text-align:center;text-shadow:0 0 40px rgba(255,215,0,.3);}
    .smeta{display:flex;align-items:center;gap:12px;margin:8px 0 16px;}
    .rpill{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;color:#000;}
    .snat{color:#6b7280;font-size:13px;}

    .bidwrap{text-align:center;margin-bottom:14px;}
    .bidlbl{color:#6b7280;font-size:10px;letter-spacing:5px;font-weight:700;margin-bottom:4px;}
    .bidprice{font-family:var(--font-t);font-size:66px;color:var(--gold);letter-spacing:4px;text-shadow:0 0 50px rgba(255,215,0,.5);}

    .tbadge{border:2px solid;border-radius:12px;padding:10px 28px;text-align:center;margin-bottom:14px;animation:borderPulse 1.5s infinite;}
    .tblbl{font-size:10px;color:#6b7280;letter-spacing:3px;margin-bottom:4px;}
    .tbrow{display:flex;align-items:center;justify-content:center;gap:10px;}
    .tbname{font-family:var(--font-d);font-size:24px;letter-spacing:3px;}

    .timer{font-family:var(--font-t);font-size:50px;letter-spacing:6px;text-shadow:0 0 30px currentColor;}

    #soldOv{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px);flex-direction:column;gap:14px;padding:24px;}
    .sstamp{font-family:var(--font-d);font-size:88px;color:#ff1744;border:6px solid #ff1744;padding:10px 42px;border-radius:8px;transform:rotate(-6deg);animation:soldAnim .5s cubic-bezier(.36,1.6,.4,1) forwards;text-shadow:0 0 40px #ff174466;}
    .sinfo{text-align:center;animation:fadeUp .4s .35s ease both;}
    .splayer{font-family:var(--font-d);font-size:42px;color:#fff;letter-spacing:3px;}
    .stolbl{font-size:11px;color:#6b7280;letter-spacing:4px;margin:8px 0 4px;}
    .stewrap{display:flex;align-items:center;justify-content:center;gap:12px;}
    .stename{font-family:var(--font-d);font-size:30px;letter-spacing:3px;}
    .sprice{font-family:var(--font-t);font-size:24px;color:var(--gold);margin-top:10px;}

    #unsoldOv{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);}
    .ustamp{font-family:var(--font-d);font-size:88px;color:#6b7280;border:6px solid #6b7280;padding:10px 42px;border-radius:8px;transform:rotate(-6deg);animation:soldAnim .5s ease forwards;}

    .confetti{position:fixed;pointer-events:none;z-index:200;width:8px;height:8px;border-radius:2px;animation:confettiFall var(--d,2s) ease-in var(--dl,0s) forwards;}

    .side{position:fixed;right:12px;top:68px;width:205px;background:rgba(13,17,23,.92);border:1px solid #1f2937;border-radius:12px;padding:11px;z-index:20;backdrop-filter:blur(10px);}
    .slbl{font-size:10px;color:#6b7280;letter-spacing:3px;font-weight:700;margin-bottom:7px;}
    .srow{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid #1f293733;}
    .sn{flex:1;font-size:11px;color:#d1d5db;}
    .st2{font-size:10px;font-weight:700;margin-right:4px;}
    .sp2{font-family:var(--font-t);font-size:10px;color:var(--gold);}

    .ticker{position:fixed;bottom:42px;left:0;right:0;height:26px;background:rgba(255,215,0,.07);border-top:1px solid rgba(255,215,0,.14);overflow:hidden;z-index:30;}
    .tickertxt{display:inline-block;white-space:nowrap;padding:4px 0;font-family:var(--font-t);font-size:10px;color:var(--gold);letter-spacing:2px;animation:ticker 35s linear infinite;}

    .pbar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:3px;padding:6px 8px;background:rgba(5,8,16,.96);border-top:1px solid #1f2937;z-index:20;overflow-x:auto;}
    .pi{display:flex;flex-direction:column;align-items:center;border:1px solid;border-radius:7px;padding:4px 7px;min-width:64px;flex-shrink:0;}
    .piid{font-family:var(--font-d);font-size:13px;}
    .piamt{font-size:9px;color:#aaa;margin-top:1px;font-family:var(--font-t);}

  {id:"RR",  name:"Rajasthan Royals",            color:"#e91e8c", emoji:"👸", logo:"rr.png"},
  {id:"DC",  name:"Delhi Capitals",              color:"#0078BC", emoji:"🦅", logo:"dc.jpg"},
  {id:"PBKS",name:"Punjab Kings",                color:"#ED1B24", emoji:"🦁", logo:"pbks.png"},

  {id:"LSG", name:"Lucknow Super Giants",        color:"#00bcd4", emoji:"🦟", logo:"lsg.jpg"},
];

const ROLE_META={
  "Batsman":     {color:"#38bdf8",icon:"🏏"},
  "Bowler":      {color:"#f87171",icon:"🎳"},
  "All-rounder": {color:"#4ade80",icon:"⭐"},
  "Wicketkeeper":{color:"#c084fc",icon:"🧤"},
};
const PURSE_LAKHS=8000;
function fmt(l){return l>=100?'₹'+(l/100).toFixed(2)+' Cr':'₹'+l+' L';}

</script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div id="setupScreen">
  <div class="sc">
    <div class="st">📺 STAGE DISPLAY</div>
    <input class="si" id="s_dbUrl" placeholder="Database URL"/>
    <input class="si" id="s_apiKey" placeholder="API Key"/>
    <button class="sb" onclick="go()">CONNECT →</button>
  </div>
</div>

<div id="stageRoot">
  <div class="bg"></div>
  <div class="pts" id="pts"></div>
  <div class="hdr">
    <div class="brand">🏏 IPL AUCTION 2025</div>
    <div class="lpill"><div class="ldot"></div><span class="ltxt">LIVE</span></div>
  </div>
  <div class="main" id="main">
    <div class="idle"><div class="idle-ic">🏏</div><div class="idle-tx">AUCTION BEGINS SOON</div><div class="idle-sx">Waiting for host...</div></div>
  </div>
  <div class="side"><div class="slbl">SOLD PLAYERS</div><div id="slist" style="max-height:280px;overflow-y:auto"><div style="color:#374151;font-size:12px;text-align:center;padding:8px">—</div></div></div>
  <div class="ticker"><span class="tickertxt" id="tkr">🏏 IPL AUCTION 2025 &nbsp;•&nbsp; LIVE BIDDING &nbsp;•&nbsp; 10 TEAMS &nbsp;•&nbsp; ₹80 CR PURSE EACH &nbsp;•&nbsp;</span></div>
  <div class="pbar" id="pbar"></div>
  <div id="soldOv"><div class="sstamp">SOLD!</div><div class="sinfo" id="sinf"></div></div>
  <div id="unsoldOv"><div class="ustamp">UNSOLD</div></div>
</div>

<script>
let db,tp={},sp=[];
TEAMS.forEach(t=>tp[t.id]=PURSE_LAKHS);

function lh(t,sz=40){const src=t.logo||`images/teams/${t.id.toLowerCase()}.png`;return `<img src="${src}" style="width:${sz}px;height:${sz}px;object-fit:contain" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"/><span style="display:none;font-size:${Math.round(sz*.65)}px">${t.emoji}</span>`;}

window.addEventListener('DOMContentLoaded',()=>{
  renderPbar();
  const s=localStorage.getItem('ipl_fb_config');
  if(s){try{const c=JSON.parse(s);document.getElementById('s_dbUrl').value=c.databaseURL||'';document.getElementById('s_apiKey').value=c.apiKey||'';}catch(e){}}
  const pc=document.getElementById('pts');
  for(let i=0;i<25;i++){const p=document.createElement('div');p.className='pt';p.style.cssText=`left:${Math.random()*100}%;--d:${3+Math.random()*4}s;--dl:${Math.random()*5}s`;pc.appendChild(p);}
});

function go(){
  const url=document.getElementById('s_dbUrl').value.trim();
  const key=document.getElementById('s_apiKey').value.trim();
  if(!url){alert('Enter Database URL');return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp({databaseURL:url,apiKey:key});
    db=firebase.database();
    document.getElementById('setupScreen').style.display='none';
    document.getElementById('stageRoot').style.display='block';
    listen();
  }catch(e){alert('Error: '+e.message);}
}

function listen(){
  db.ref('auction').on('value',snap=>{
    const d=snap.val();
    if(!d||d.phase==='idle'){rIdle();return;}
    if(d.phase==='bidding'){rBid(d);return;}
    if(d.phase==='sold'){rSold(d);return;}
    if(d.phase==='unsold'){rUnsold();return;}
  });
  db.ref('timer').on('value',snap=>{
    const d=snap.val();if(!d)return;
    const el=document.getElementById('stimer');if(!el)return;
    const v=Math.max(0,d.value);
    el.textContent=String(v).padStart(2,'0')+'s';
    el.style.color=v<=10?'#ff4444':'var(--gold)';
  });
  db.ref('sold').on('value',snap=>{sp=snap.val()?Object.values(snap.val()):[];rSide();rTicker();});
  db.ref('purses').on('value',snap=>{if(snap.val()){tp=snap.val();renderPbar();}});
}

function rIdle(){
  document.getElementById('soldOv').style.display='none';
  document.getElementById('unsoldOv').style.display='none';
  document.getElementById('main').innerHTML=`<div class="idle"><div class="idle-ic">🏏</div><div class="idle-tx">AWAITING NEXT PLAYER</div><div class="idle-sx">Host is selecting...</div></div>`;
}

function rBid(d){
  document.getElementById('soldOv').style.display='none';
  document.getElementById('unsoldOv').style.display='none';
  const rm=ROLE_META[d.role]||{color:'#fff',icon:'🏏'};
  const t=d.team?TEAMS.find(x=>x.id===d.team):null;
  const img=d.image||`images/players/${(d.name||'').toLowerCase().replace(/ /g,'_')}.png`;
  document.getElementById('main').innerHTML=`
    <div class="pstage">
      <div class="awrap">
        <div class="aglow" style="background:${rm.color}"></div>
        <div class="aring" style="border-color:${rm.color}"></div>
        <img class="sphoto" src="${img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="sfb" style="background:${rm.color}18;border-color:${rm.color}44;display:none">${rm.icon}</div>
      </div>
      <div class="sname">${d.name||''}</div>
      <div class="smeta"><span class="rpill" style="background:${rm.color}">${d.role||''}</span><span class="snat">${d.nat||''}</span></div>
      <div class="bidwrap"><div class="bidlbl">CURRENT BID</div><div class="bidprice">${fmt(d.price||0)}</div></div>
      ${t?`<div class="tbadge" style="border-color:${t.color};color:${t.color}"><div class="tblbl">HIGHEST BIDDER</div><div class="tbrow">${lh(t,38)}<div class="tbname">${t.name}</div></div></div>`:`<div style="color:#374151;font-family:var(--font-d);font-size:16px;letter-spacing:3px;margin-bottom:14px">PLACE YOUR BIDS</div>`}
      <div class="timer" id="stimer" style="color:var(--gold)">30s</div>
    </div>`;
}

function rSold(d){
  const t=d.team?TEAMS.find(x=>x.id===d.team):null;
  document.getElementById('sinf').innerHTML=`
    <div class="splayer">${d.name||''}</div>
    <div class="stolbl">SOLD TO</div>
    <div class="stewrap">${t?lh(t,54):''}<div class="stename" style="color:${t?.color||'#fff'}">${t?.name||d.team}</div></div>
    <div class="sprice">${fmt(d.price||0)}</div>`;
  document.getElementById('soldOv').style.display='flex';
  confetti();
}

function rUnsold(){
  document.getElementById('soldOv').style.display='none';
  document.getElementById('unsoldOv').style.display='flex';
  setTimeout(()=>document.getElementById('unsoldOv').style.display='none',2500);
}

function rSide(){
  const el=document.getElementById('slist');
  if(!sp.length){el.innerHTML='<div style="color:#374151;font-size:12px;text-align:center;padding:8px">—</div>';return;}
  el.innerHTML=[...sp].reverse().slice(0,10).map(s=>{
    const t=TEAMS.find(x=>x.id===s.soldTeam);
    return `<div class="srow"><span class="sn">${s.name}</span><span class="st2" style="color:${t?.color||'#fff'}">${s.soldTeam}</span><span class="sp2">${fmt(s.soldPrice)}</span></div>`;
  }).join('');
}

function renderPbar(){
  const el=document.getElementById('pbar');if(!el)return;
  el.innerHTML=TEAMS.map(t=>`<div class="pi" style="border-color:${t.color}55"><div class="piid" style="color:${t.color}">${t.id}</div><div class="piamt">${fmt(tp[t.id]??PURSE_LAKHS)}</div></div>`).join('');
}

function rTicker(){
  if(!sp.length)return;
  document.getElementById('tkr').textContent='🏏 SOLD: '+sp.map(s=>`${s.name} → ${s.soldTeam} (${fmt(s.soldPrice)})`).join(' • ')+' • ';
}

function confetti(){
  const cols=['#FFD700','#FF6B00','#EC1C24','#4fc3f7','#a5d6a7','#fff'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${cols[i%cols.length]};--d:${1.5+Math.random()*2}s;--dl:${Math.random()*.6}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),4000);
  }
}
</script>
</body>
</html>
