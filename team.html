const ROLE_META={

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}

<!-- ══ SETUP ══════════════════════════════════════════════════════ -->
<div id="setupScreen" class="screen active">
  <div class="s-logo">🏏 IPL</div>
  <div class="s-sub">AUCTION 2025</div>
  <div class="s-card">
    <label class="s-label">DATABASE URL</label>
    <input class="s-input" id="t_dbUrl" placeholder="https://your-project-rtdb.firebaseio.com"/>
    <label class="s-label">API KEY</label>
    <input class="s-input" id="t_apiKey" placeholder="AIzaSy..."/>
    <button class="s-btn" onclick="initTeam()">JOIN AUCTION →</button>
  </div>
</div>

<!-- ══ SELECT TEAM ════════════════════════════════════════════════ -->
<div id="selectScreen" class="screen">
  <div class="sel-head">
    <div class="sel-sub2">IPL AUCTION 2025</div>
    <div class="sel-title">SELECT TEAM</div>
  </div>
  <div class="carousel-wrap">
    <div class="carousel-row">
      <button class="car-btn" onclick="prevT()">‹</button>
      <div class="team-showcase" id="showcase"></div>
      <button class="car-btn" onclick="nextT()">›</button>
    </div>
    <div class="team-name-box" id="nameBox"></div>
    <div class="dots" id="dotsRow"></div>
    <button class="cont-btn" id="contBtn" onclick="confirmTeam()" disabled>Continue</button>
  </div>
</div>

<!-- ══ BIDDING CONSOLE ════════════════════════════════════════════ -->
<div id="biddingScreen" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="purse-box">
      <div class="purse-lbl">REMAINING PURSE</div>
      <div class="purse-val" id="purseVal">₹80 Cr</div>
    </div>
  </div>
  <div class="my-strip" id="myStrip"></div>
  <div id="auctionArea"></div>
  <div class="tabs">
    <button class="tab on" id="tabS" onclick="switchTab('squad')">MY SQUAD</button>
    <button class="tab"    id="tabP" onclick="switchTab('purse')">ALL PURSES</button>
  </div>
  <div class="tab-body" id="tabBody"></div>
</div>

<!-- SOLD overlay -->
<div id="soldOv" onclick="this.style.display='none'">
  <div class="sold-stamp">SOLD!</div>
  <div class="sold-det" id="soldDet"></div>
  <div class="tap-lbl">tap to dismiss</div>
</div>
<div id="flashOv"></div>

<script>
/* ── State ── */
let db, myTeam=null, curIdx=0, curAuction=null;
let soldPlayers=[], teamPurses={}, takenTeams={}, activeTab='squad';
let lastBidPrice=0, bidLocked=false; // bid lock — one bid per turn
TEAMS.forEach(t=>teamPurses[t.id]=PURSE_LAKHS);

/* ── Helpers ── */
function showScreen(id){
  ['setupScreen','selectScreen','biddingScreen'].forEach(s=>{
    const el=document.getElementById(s);
    el.classList.remove('active');
    el.style.display='none';
  });
  const el=document.getElementById(id);
  el.style.display='flex';
  el.classList.add('active');
}

function logoHTML(t,sz=60){
  const src=t.logo||'';
  if(!src) return `<span style="font-size:${Math.round(sz*.6)}px">${t.emoji}</span>`;
  return `<img src="${src}" style="width:${sz}px;height:${sz}px;object-fit:contain;"
    onerror="this.outerHTML='<span style=\\'font-size:${Math.round(sz*.6)}px\\'>${t.emoji}</span>'"/>`;
}

/* ── Auto-fill saved config ── */
window.addEventListener('DOMContentLoaded',()=>{
  const s=localStorage.getItem('ipl_fb_config');
  if(s){
    try{
      const c=JSON.parse(s);
      document.getElementById('t_dbUrl').value=c.databaseURL||'';
      document.getElementById('t_apiKey').value=c.apiKey||'';
    }catch(e){}
  }
});

/* ── Init Firebase ── */
function initTeam(){
  const url=document.getElementById('t_dbUrl').value.trim();
  const key=document.getElementById('t_apiKey').value.trim();
  if(!url){alert('Enter Database URL');return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp({databaseURL:url,apiKey:key});
    db=firebase.database();
    localStorage.setItem('ipl_fb_config',JSON.stringify({databaseURL:url,apiKey:key}));
    showScreen('selectScreen');
    renderCarousel();
    listen();
  }catch(e){alert('Error: '+e.message);}
}

/* ── Carousel ── */
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>50&&document.getElementById('selectScreen').classList.contains('active')){
    dx<0?nextT():prevT();
  }
});

function prevT(){curIdx=(curIdx-1+TEAMS.length)%TEAMS.length;renderCarousel();}
function nextT(){curIdx=(curIdx+1)%TEAMS.length;renderCarousel();}

function renderCarousel(){
  const t=TEAMS[curIdx];
  const isTaken=takenTeams[t.id]&&takenTeams[t.id]!==myTeam;

  // Logo / emoji
  let logoEl='';
  if(t.logo){
    logoEl=`<img class="showcase-logo" src="${t.logo}"
      onerror="this.outerHTML='<div class=\\'showcase-emoji\\'>${t.emoji}</div>'"
      style="border-radius:50%;border:3px solid ${t.color}55;"/>`;
  } else {
    logoEl=`<div class="showcase-emoji">${t.emoji}</div>`;
  }

  document.getElementById('showcase').innerHTML=`
    ${logoEl}
    ${isTaken?`<div class="taken-badge"><div class="taken-icon">🔒</div><div class="taken-lbl">TAKEN</div></div>`:''}
  `;

  document.getElementById('nameBox').innerHTML=`
    <div class="tnb-id" style="color:${t.color}">${t.id}</div>
    <div class="tnb-name">${t.name}</div>
    <div class="tnb-status" style="color:${isTaken?'#ef4444':'#4ade80'}">
      ${isTaken?'❌ Already taken':'✅ Available'}
    </div>
  `;

  // Dots
  document.getElementById('dotsRow').innerHTML=TEAMS.map((x,i)=>{
    const isTk=takenTeams[x.id]&&takenTeams[x.id]!==myTeam;
    return `<div class="dot ${i===curIdx?'active':''} ${isTk?'taken':''}" onclick="curIdx=${i};renderCarousel()"></div>`;
  }).join('');

  const btn=document.getElementById('contBtn');
  btn.disabled=isTaken;
}

function confirmTeam(){
  const t=TEAMS[curIdx];
  if(takenTeams[t.id]&&takenTeams[t.id]!==myTeam){alert('Already taken!');return;}
  if(myTeam)db.ref('takenTeams/'+myTeam).remove();
  myTeam=t.id;
  db.ref('takenTeams/'+t.id).set(true);
  showScreen('biddingScreen');
  renderStrip();
  updatePurse();
  renderWait();
  renderTab();
  if(curAuction&&curAuction.phase==='bidding')renderBidding(curAuction);
}

function goBack(){
  if(myTeam){db.ref('takenTeams/'+myTeam).remove();myTeam=null;}
  showScreen('selectScreen');
  renderCarousel();
}

/* ── Strip & Purse ── */
function renderStrip(){
  if(!myTeam)return;
  const t=TEAMS.find(x=>x.id===myTeam);
  document.getElementById('myStrip').innerHTML=`
    ${logoHTML(t,48)}
    <div style="margin-left:12px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:2px;color:${t.color}">${t.id}</div>
      <div style="font-size:11px;color:#9ca3af">${t.name}</div>
    </div>
    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-lbl">LIVE</span>
    </div>
  `;
}

function updatePurse(){
  if(!myTeam)return;
  const p=teamPurses[myTeam]??PURSE_LAKHS;
  document.getElementById('purseVal').textContent=fmt(p);
}

/* ── Auction Area ── */
function renderAuction(d){
  if(!d||d.phase==='idle'||d.phase==='unsold'){renderWait();return;}
  if(d.phase==='bidding'){renderBidding(d);}
}

function renderWait(){
  document.getElementById('auctionArea').innerHTML=`
    <div class="wait-box">
      <div class="wait-icon">⏳</div>
      <div class="wait-txt">WAITING FOR NEXT PLAYER</div>
    </div>`;
}

function renderBidding(d){
  const rm=ROLE_META[d.role]||{color:'#fff',icon:'🏏'};
  const bt=d.team?TEAMS.find(x=>x.id===d.team):null;
  const next=(d.price||0)+10;
  const purse=teamPurses[myTeam]??PURSE_LAKHS;
  const lead=d.team===myTeam;

  // Bid lock: unlock when someone else bids after us
  if(bidLocked && d.team !== myTeam && d.price > lastBidPrice){
    bidLocked=false;
  }
  // Reset lock when new player comes up
  if(!curAuction || d.id !== curAuction?.id){
    bidLocked=false;
    lastBidPrice=0;
  }

  const canBid=!!myTeam && purse>=next && !lead && !bidLocked;

  let stat='';
  if(lead)        stat='<div class="bs-status lead">✅ YOU ARE HIGHEST BIDDER!</div>';
  else if(bidLocked) stat='<div class="bs-status wait">⏳ Wait for another team to bid...</div>';
  else if(d.team) stat=`<div class="bs-status out">⚡ ${bt?.name||d.team} IS LEADING</div>`;
  else            stat='<div class="bs-status wait">No bids yet — be first!</div>';

  document.getElementById('auctionArea').innerHTML=`
    <div class="player-card">
      <div class="pc-head">
        <div class="pc-name">${d.name||''}</div>
        <div class="pc-meta">
          <span class="role-pill" style="background:${rm.color}">${d.role||''}</span>
          <span class="pc-nat">${d.nat||''}</span>
        </div>
      </div>
      <div class="pc-base">
        <span class="pc-base-lbl">BASE PRICE</span>
        <span class="pc-base-val">${fmt(d.basePrice||d.price||0)}</span>
      </div>
    </div>
    <div class="bid-section">
      <div class="bs-lbl">CURRENT BID</div>
      ${bt
        ?`<div style="display:flex;flex-direction:column;align-items:center;gap:4px">${logoHTML(bt,68)}<div class="bs-team-id" style="color:${bt.color}">${bt.id}</div></div>`
        :`<div style="height:44px"></div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:#374151;letter-spacing:3px">NO BIDS YET</div>`}
      <div class="bs-amount" id="bidAmt">${fmt(d.price||0)}</div>
      ${stat}
    </div>
    <div class="bid-btn-row">
      <button class="bid-btn ${lead?'green':'fire'}" onclick="placeBid()" ${canBid?'':'disabled'}>
        ${lead?'YOU ARE LEADING ✓': bidLocked?'WAIT FOR NEXT BID...': canBid?`BID → ${fmt(next)}`:'WAITING...'}
      </button>
    </div>
    <div style="padding:8px 14px 0;">
      <button onclick="notInterested()" style="
        width:100%;padding:14px;
        background:transparent;
        border:2px solid #374151;
        border-radius:12px;
        color:#6b7280;
        font-family:'Bebas Neue',sans-serif;
        font-size:18px;letter-spacing:3px;
        cursor:pointer;
        transition:all .2s;
      " onmouseover="this.style.borderColor='#ef4444';this.style.color='#ef4444'"
         onmouseout="this.style.borderColor='#374151';this.style.color='#6b7280'">
        ✖ NOT INTERESTED
      </button>
    </div>
  `;
}

function placeBid(){
  if(!myTeam||!curAuction||curAuction.phase!=='bidding')return;
  if(bidLocked){return;} // prevent double bid
  const np=(curAuction.price||0)+10;
  if((teamPurses[myTeam]||PURSE_LAKHS)<np){alert('Not enough purse!');return;}
  // Lock bid until someone else bids
  bidLocked=true;
  lastBidPrice=np;
  db.ref('auction').update({price:np,team:myTeam});
  const f=document.getElementById('flashOv');
  f.style.opacity='1';setTimeout(()=>f.style.opacity='0',300);
  // Re-render to show locked state
  renderBidding({...curAuction,price:np,team:myTeam});
}

function notInterested(){
  // Just show a local message — hides bid button for this player
  bidLocked=true;
  const area=document.getElementById('auctionArea');
  const btn=area.querySelector('.bid-btn');
  if(btn){btn.disabled=true;btn.textContent='NOT INTERESTED';}
  const notBtn=area.querySelector('button:last-child');
  if(notBtn){
    notBtn.textContent='✖ SKIPPED';
    notBtn.disabled=true;
    notBtn.style.color='#ef4444';
    notBtn.style.borderColor='#ef4444';
  }
}

/* ── Tabs ── */
function switchTab(t){
  activeTab=t;
  document.getElementById('tabS').className='tab'+(t==='squad'?' on':'');
  document.getElementById('tabP').className='tab'+(t==='purse'?' on':'');
  renderTab();
}

function renderTab(){
  const el=document.getElementById('tabBody');
  if(!el)return;
  if(activeTab==='squad'){
    const mine=soldPlayers.filter(p=>p.soldTeam===myTeam);
    if(!mine.length){el.innerHTML='<div class="empty">No players yet</div>';return;}
    el.innerHTML=mine.map(sp=>{
      const rm=ROLE_META[sp.role]||{color:'#fff',icon:'🏏'};
      return `<div class="sq-row"><div><div class="sq-name">${sp.name}</div><div class="sq-role">${rm.icon} ${sp.role}</div></div><div class="sq-price">${fmt(sp.soldPrice)}</div></div>`;
    }).join('');
  } else {
    el.innerHTML=TEAMS.map(t=>`
      <div class="sq-row">
        <div style="display:flex;align-items:center;gap:10px">
          ${logoHTML(t,32)}
          <div>
            <div style="font-size:13px;font-weight:700;color:${t.color}">${t.id}</div>
            <div style="font-size:10px;color:#6b7280">${soldPlayers.filter(p=>p.soldTeam===t.id).length} players</div>
          </div>
        </div>
        <div class="sq-price">${fmt(teamPurses[t.id]??PURSE_LAKHS)}</div>
      </div>`).join('');
  }
}

/* ── Sold overlay ── */
function showSold(d){
  const t=d.team?TEAMS.find(x=>x.id===d.team):null;
  const me=d.team===myTeam;
  document.getElementById('soldDet').innerHTML=`
    <div class="sold-p">${d.name||''}</div>
    <div class="sold-to">SOLD TO</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px">
      ${t?logoHTML(t,48):''}
      <div class="sold-t" style="color:${t?.color||'#fff'}">${t?.name||d.team||''}</div>
    </div>
    <div class="sold-pr">${fmt(d.price||0)}</div>
    ${me?'<div class="sold-you">🎉 YOU WON THIS PLAYER!</div>':''}
  `;
  document.getElementById('soldOv').style.display='flex';
  setTimeout(()=>document.getElementById('soldOv').style.display='none',4500);
}

/* ── Firebase listeners ── */
function listen(){
  db.ref('takenTeams').on('value',snap=>{
    takenTeams=snap.val()||{};
    if(document.getElementById('selectScreen').classList.contains('active'))renderCarousel();
  });
  db.ref('auction').on('value',snap=>{
    const d=snap.val();
    const prev=curAuction;
    // Reset lock when new player appears
    if(d && prev && d.id !== prev.id){
      bidLocked=false;
      lastBidPrice=0;
    }
    curAuction=d;
    if(!d)return;
    if(d.phase==='sold'&&prev?.phase==='bidding')showSold(d);
    if(document.getElementById('biddingScreen').classList.contains('active'))renderAuction(d);
  });
  db.ref('sold').on('value',snap=>{
    soldPlayers=snap.val()?Object.values(snap.val()):[];
    renderTab();
  });
  db.ref('purses').on('value',snap=>{
    if(snap.val()){
      teamPurses=snap.val();
      updatePurse();
      renderTab();
    }
  });
}
</script>
</body>
</html>
