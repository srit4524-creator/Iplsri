  </style>
</head>
<body>

<script>
let db, ticker, soldPlayers=[], teamPurses={}, selectedPlayer=null, auctionActive=false;
let filterMode='all', searchQ='';
TEAMS.forEach(t=>teamPurses[t.id]=PURSE_LAKHS);

const rc=r=>({Batsman:'#38bdf8',Bowler:'#f87171','All-rounder':'#4ade80',Wicketkeeper:'#c084fc'}[r]||'#fff');
const ri=r=>({Batsman:'🏏',Bowler:'🎳','All-rounder':'⭐',Wicketkeeper:'🧤'}[r]||'🏏');

// Auto-fill
window.addEventListener('DOMContentLoaded',()=>{
  renderPurses();
  const s=localStorage.getItem('ipl_fb_config');
  if(s){try{const c=JSON.parse(s);document.getElementById('h_api').value=c.apiKey||'';document.getElementById('h_auth').value=c.authDomain||'';document.getElementById('h_db').value=c.databaseURL||'';document.getElementById('h_pid').value=c.projectId||'';}catch(e){}}
});

function initHost(){
  const cfg={apiKey:document.getElementById('h_api').value.trim(),authDomain:document.getElementById('h_auth').value.trim(),databaseURL:document.getElementById('h_db').value.trim(),projectId:document.getElementById('h_pid').value.trim()};
  if(!cfg.databaseURL){alert('Enter Database URL');return;}
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    db=firebase.database();
    localStorage.setItem('ipl_fb_config',JSON.stringify(cfg));
    document.getElementById('setupScreen').style.display='none';
    document.getElementById('hostPanel').style.display='flex';
    filterPlayers();
    startListeners();
  }catch(e){alert('Firebase error: '+e.message);}
}

// ── Player Search & Filter ──────────────────────────────────────────
function setFilter(f){
  filterMode=f;
  ['all','bat','bowl','ar','wk'].forEach(x=>document.getElementById('f-'+x).classList.toggle('on',x===f));
  filterPlayers();
}

function filterPlayers(){
  searchQ=document.getElementById('searchIn').value.toLowerCase();
  const soldIds=soldPlayers.map(s=>s.id);
  let list=PLAYERS.filter(p=>{
    if(soldIds.includes(p.id))return false;
    if(searchQ&&!p.name.toLowerCase().includes(searchQ)&&!(p.team||'').toLowerCase().includes(searchQ))return false;
    if(filterMode==='bat' &&p.role!=='Batsman')return false;
    if(filterMode==='bowl'&&p.role!=='Bowler')return false;
    if(filterMode==='ar'  &&p.role!=='All-rounder')return false;
    if(filterMode==='wk'  &&p.role!=='Wicketkeeper')return false;
    return true;
  });

  const el=document.getElementById('playerList');
  if(!list.length){el.innerHTML='<div class="no-results">No players found</div>';return;}
  el.innerHTML=list.map(p=>{
    const c=rc(p.role);
    const t=TEAMS.find(x=>x.id===p.team);
    const sel=selectedPlayer?.id===p.id;
    return `<div class="pl-row ${sel?'selected':''}" onclick="selectPlayer(${p.id})">
      <span style="font-size:20px">${ri(p.role)}</span>
      <div class="pl-name">${p.name}</div>
      ${t?`<span class="pl-team-tag" style="background:${t.color};color:${t.id==='MI'?'#fff':'#000'}">${p.team}</span>`:''}
      <span class="pl-role" style="background:${c}">${p.role}</span>
      <span class="pl-base">${fmt(p.base)}</span>
    </div>`;
  }).join('');
}

function selectPlayer(id){
  if(auctionActive){alert('Finish current auction first!');return;}
  selectedPlayer=PLAYERS.find(p=>p.id===id);
  filterPlayers(); // refresh to show selection
  renderPreview();
  document.getElementById('startBtn').disabled=false;
}

function renderPreview(){
  if(!selectedPlayer){document.getElementById('playerPreview').innerHTML='<div class="pp-empty">← SEARCH AND SELECT A PLAYER ABOVE</div>';return;}
  const p=selectedPlayer;
  const c=rc(p.role);
  const t=TEAMS.find(x=>x.id===p.team);
  document.getElementById('playerPreview').innerHTML=`
    <div class="pp-icon" style="background:${c}22;border:2px solid ${c}55;">${ri(p.role)}</div>
    <div>
      <div class="pp-name">${p.name}</div>
      <div class="pp-sub">
        <span style="padding:3px 10px;border-radius:20px;background:${c};font-size:11px;font-weight:700;color:#000">${p.role}</span>
        <span style="font-size:12px;color:#9ca3af">${p.nat}</span>
        ${t?`<span style="padding:2px 8px;border-radius:3px;background:${t.color};color:${t.id==='MI'?'#fff':'#000'};font-size:10px;font-weight:700">${p.team}</span>`:''}
      </div>
      <div style="font-size:12px;color:#6b7280;margin-top:4px">${p.stats}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);margin-top:4px">Base: ${fmt(p.base)}</div>
    </div>`;
}

// ── Auction Controls ───────────────────────────────────────────────
function startAuction(){
  if(!selectedPlayer)return;
  auctionActive=true;
  const p=selectedPlayer;
  db.ref('auction').set({id:p.id,name:p.name,role:p.role,nat:p.nat,stats:p.stats,price:p.base,basePrice:p.base,team:'',phase:'bidding',timer:30});
  db.ref('timer').set({value:30,running:true});
  document.getElementById('startBtn').disabled=true;
  document.getElementById('sellBtn').disabled=true;
  document.getElementById('unsoldBtn').style.display='block';
  document.getElementById('bcPrice').textContent=fmt(p.base);
  document.getElementById('bcPrice').style.color='var(--gold)';
  document.getElementById('bcTeam').textContent='No bids yet';
  document.getElementById('bcTeam').style.color='#6b7280';
  startCountdown();
}

function startCountdown(){
  clearInterval(ticker);
  let t=30;
  ticker=setInterval(()=>{t--;db.ref('timer').set({value:t,running:t>0});if(t<=0)clearInterval(ticker);},1000);
}

async function sellPlayer(){
  const snap=await db.ref('auction').once('value');
  const d=snap.val();
  if(!d||!d.team)return;
  clearInterval(ticker);
  const entry={id:d.id,name:d.name,role:d.role,soldPrice:d.price,soldTeam:d.team};
  teamPurses[d.team]=Math.max(0,(teamPurses[d.team]??PURSE_LAKHS)-d.price);
  await db.ref('sold').push(entry);
  await db.ref('purses').set(teamPurses);
  await db.ref('auction').update({phase:'sold'});
  await db.ref('timer').set({value:0,running:false});
  document.getElementById('sellBtn').disabled=true;
  document.getElementById('unsoldBtn').style.display='none';
  setTimeout(()=>{
    db.ref('auction').set({phase:'idle'});
    auctionActive=false;
    selectedPlayer=null;
    renderPreview();
    document.getElementById('startBtn').disabled=true;
    document.getElementById('bcPrice').textContent='—';
    document.getElementById('bcPrice').style.color='#1f2937';
    document.getElementById('bcTeam').textContent='No bids yet';
    document.getElementById('bcTeam').style.color='#1f2937';
    filterPlayers();
  },3000);
}

function unsoldPlayer(){
  clearInterval(ticker);
  db.ref('auction').update({phase:'unsold'});
  db.ref('timer').set({value:0,running:false});
  document.getElementById('sellBtn').disabled=true;
  document.getElementById('unsoldBtn').style.display='none';
  setTimeout(()=>{
    db.ref('auction').set({phase:'idle'});
    auctionActive=false;
    selectedPlayer=null;
    renderPreview();
    document.getElementById('startBtn').disabled=true;
    document.getElementById('bcPrice').textContent='—';
    document.getElementById('bcPrice').style.color='#1f2937';
    document.getElementById('bcTeam').textContent='No bids yet';
    filterPlayers();
  },2000);
}

// ── Firebase Listeners ─────────────────────────────────────────────
function startListeners(){
  db.ref('auction').on('value',snap=>{
    const d=snap.val();
    if(!d)return;
    const pe=document.getElementById('bcPrice');
    pe.style.animation='none';
    requestAnimationFrame(()=>pe.style.animation='pricePop .4s ease');
    if(d.price){pe.textContent=fmt(d.price);pe.style.color='var(--gold)';}
    if(d.team){
      const t=TEAMS.find(x=>x.id===d.team);
      document.getElementById('bcTeam').textContent=t?.name||d.team;
      document.getElementById('bcTeam').style.color=t?.color||'#fff';
      document.getElementById('sellBtn').disabled=false;
    }
  });
  db.ref('timer').on('value',snap=>{
    const d=snap.val();
    if(!d)return;
    const pct=(d.value/30)*100;
    const f=document.getElementById('timerFill');
    f.style.width=pct+'%';
    f.style.background=d.value<=10?'#ff1744':'var(--gold)';
  });
  db.ref('sold').on('value',snap=>{soldPlayers=snap.val()?Object.values(snap.val()):[];renderSold();renderPurses();filterPlayers();});
  db.ref('purses').on('value',snap=>{if(snap.val()){teamPurses=snap.val();renderPurses();}});
}

function resetAuction(){
  if(!confirm('Reset ENTIRE auction? This clears all sold players, purses and bids!'))return;
  clearInterval(ticker);
  db.ref('/').set({auction:{phase:'idle'},sold:null,purses:null,takenTeams:null,timer:{value:0,running:false}});
  TEAMS.forEach(t=>teamPurses[t.id]=PURSE_LAKHS);
  soldPlayers=[];
  auctionActive=false;
  selectedPlayer=null;
  renderPreview();
  renderSold();
  renderPurses();
  filterPlayers();
  document.getElementById('startBtn').disabled=true;
  document.getElementById('sellBtn').disabled=true;
  document.getElementById('unsoldBtn').style.display='none';
  document.getElementById('bcPrice').textContent='—';
  document.getElementById('bcPrice').style.color='#1f2937';
  document.getElementById('bcTeam').textContent='No bids yet';
  document.getElementById('bcTeam').style.color='#1f2937';
  document.getElementById('timerFill').style.width='100%';
  alert('✅ Auction reset successfully!');
}
  const el=document.getElementById('soldList');
  document.getElementById('soldCount').textContent=soldPlayers.length;
  if(!soldPlayers.length){el.innerHTML='<div style="color:#1f2937;text-align:center;padding:12px;font-size:13px;">No players sold yet</div>';return;}
  el.innerHTML=[...soldPlayers].reverse().map(sp=>{
    const t=TEAMS.find(x=>x.id===sp.soldTeam);
    return `<div class="sold-row"><span class="sr-name">${sp.name}</span><span class="sr-team" style="background:${t?.color||'#fff'};color:${sp.soldTeam==='MI'?'#fff':'#000'}">${sp.soldTeam}</span><span class="sr-price">${fmt(sp.soldPrice)}</span></div>`;
  }).join('');
}

function renderPurses(){
  const el=document.getElementById('purseGrid');
  if(!el)return;
  el.innerHTML=TEAMS.map(t=>`<div class="pc" style="border-color:${t.color}44"><div class="pc-id" style="color:${t.color}">${t.id}</div><div class="pc-amt">${fmt(teamPurses[t.id]??PURSE_LAKHS)}</div></div>`).join('');
}
</script>
</body>
</html>
